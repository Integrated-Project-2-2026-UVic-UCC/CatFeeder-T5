; ==============================================================
;  PlatformIO Project Configuration
;  Target: ESP32 WROOM-32 (generic esp32dev board)
;  Framework: Arduino
; ==============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate (must match Serial.begin() in main.cpp)
monitor_speed = 115200

; ── Library Dependencies ──────────────────────────────────────
; PubSubClient : MQTT client for Arduino
; ArduinoJson  : JSON serialisation / deserialisation (v7)
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0

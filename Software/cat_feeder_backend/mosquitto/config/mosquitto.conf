# ─── Eclipse Mosquitto — Local Dev Config ─────────────────────────────────────
# WARNING: allow_anonymous is ON for local ESP32 testing only.
#          Remove / replace with password auth before any internet-facing deploy.

listener 1883
allow_anonymous true

# Persistence — survives container restarts
persistence true
persistence_location /mosquitto/data/

# Logging — visible in container logs AND a file
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
